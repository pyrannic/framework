name: Tests

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        install-via: [pip]

    env:
      PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: github/codeql-action/init@v4
        with:
          config-file: .github/codeql/config.yml

      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          allow-prereleases: true

      - name: Install PDM via pip
        run: python -m pip install --user pdm

      - name: Install Dependencies
        run: pdm install -G dev

      - name: Test with pytest
        run: pdm run pytest --cov=pyrannic --cov-config=pyproject.toml --cov-report=xml --junitxml=junit.xml -o junit_family=legacy tests

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          env_vars: PYTHON
          report-type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests,python-${{ matrix.python-version }}

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v7
        with:
          env_vars: PYTHON
          report-type: coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests,python-${{ matrix.python-version }}

      - name: Upload coverage report to GitHub Code Quality
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml
          language: Python
          label: code-coverage/pytest
              
